services:
  monitor-server:
    profiles:
      - all
      - monitor
    image: gridsuite/monitor-server:latest
    ports:
      - 5043:80
    volumes:
      - ../../k8s/resources/monitor/config/monitor-server-application.yml:/config/specific/application.yml:Z
      - ../../k8s/resources/common/config/common-application.yml:/config/common/application.yml:Z
    depends_on:
      logspout:
        condition: "service_started"
        required: false
      postgres:
        condition: service_healthy
      s3-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx96m
    command: --server.port=80 --spring.config.additional-location=/config/
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0 # for docker < 20.03.0
    memswap_limit: 384m
    deploy:
      resources:
        limits:
          memory: 384m

  monitor-sa-worker-server:
    profiles:
      - all
      - monitor
    image: gridsuite/monitor-worker-server:latest
    volumes:
      - ../../k8s/resources/monitor/config/monitor-sa-worker-server-application.yml:/config/specific/application.yml:Z
      - ../../k8s/resources/monitor/config/monitor-sa-worker-server-config.yml:/home/powsybl/.itools/config.yml:Z
      - ../../k8s/resources/common/config/common-application.yml:/config/common/application.yml:Z
    depends_on:
      logspout:
        condition: "service_started"
        required: false
      s3-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx768m
    command: --server.port=80 --spring.config.additional-location=/config/
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0 # for docker < 20.03.0
    memswap_limit: 1280m
    deploy:
      resources:
        limits:
          memory: 1280m

  monitor-lf-worker-server:
    profiles:
      - all
      - monitor
    image: gridsuite/monitor-worker-server:latest
    volumes:
      - ../../k8s/resources/monitor/config/monitor-lf-worker-server-application.yml:/config/specific/application.yml:Z
      - ../../k8s/resources/monitor/config/monitor-lf-worker-server-config.yml:/home/powsybl/.itools/config.yml:Z
      - ../../k8s/resources/common/config/common-application.yml:/config/common/application.yml:Z
    depends_on:
      logspout:
        condition: "service_started"
        required: false
      s3-storage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx768m
    command: --server.port=80 --spring.config.additional-location=/config/
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0 # for docker < 20.03.0
    memswap_limit: 1280m
    deploy:
