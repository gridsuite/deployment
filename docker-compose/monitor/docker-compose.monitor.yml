  gridmonitor-app:
    profiles:
      - all
      - monitor
    image: gridsuite/gridmonitor-app:latest
    ports:
      - 85:8080
    volumes:
      - ./gridmonitor-app-idpSettings.json:/opt/bitnami/apache/htdocs/gridmonitor/idpSettings.json:Z
      - ../env.json:/opt/bitnami/apache/htdocs/gridmonitor/env.json:Z
    depends_on:
      logspout:
        condition: "service_started"
        required: false
    memswap_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128m
    restart: unless-stopped
