<VirtualHost *:8080>
  DocumentRoot "/usr/local/apache2/htdocs"

  # We deliberately have no documents in the htdocs directory
  # to force httpd to reply with 404 for every request
  # (except for the 404.html and favicon files)
  # This is a bit of a hack, httpd always look for a file
  # which will never exist. should we use something more
  # specific to this use case ?
  ErrorDocument 404 /404.html
</VirtualHost>
