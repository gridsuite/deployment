apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-backend
  labels:
    name: default-backend
    app.kubernetes.io/component: gridsuite-apache
spec:
  selector:
    matchLabels:
      name: default-backend
  template:
    metadata:
      labels:
        name: default-backend
    spec:
      containers:
        - name: main
          image: gridsuite/iodhi-httpd:2.4.68-debian13-dev@sha256:f8a042e7f71c9f2fc2b30519a9970b2b74b9e4b43a770d3f9144943a1e5c2cbd
          volumeMounts:
            - mountPath: /usr/local/apache2/htdocs/
              name: default-backend-htdocs-configmap-volume
            - mountPath: /usr/local/apache2/conf/app-httpd.conf
              subPath: app-httpd.conf
              name: default-backend-conf-configmap-volume
      volumes:
        - name: default-backend-htdocs-configmap-volume
          configMap:
            name: default-backend-htdocs-configmap
        - name: default-backend-conf-configmap-volume
          configMap:
            name: default-backend-conf-configmap
